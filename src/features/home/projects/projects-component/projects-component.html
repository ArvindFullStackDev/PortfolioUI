<section class="projects-section" id="projects">

    <div class="container">

    <div class="section-header">

    <!-- Center Content -->
    <div class="section-center">

        <span class="section-subtitle">
            Featured Projects
        </span>

        <h2 class="section-title">
            Some Things I've Built
        </h2>

        <p class="section-description">
            Enterprise applications built with modern .NET technologies.
        </p>

    </div>

    <!-- Right Link -->
    <a routerLink="/projects" class="view-all-link">

        View All Projects

        <i class="bi bi-arrow-right ms-1"></i>

    </a>

</div>

        <div class="row g-4">

            @for(project of projects; track project.title){

            <div class="col-lg-4 col-md-6">

                <div class="project-card">

                    <img [src]="project.image" class="project-image" [alt]="project.title">

                    <div class="project-body">

                        <h4>

                            {{project.title}}

                        </h4>

                        <p>

                            {{project.description}}

                        </p>

                        <div class="tech-stack">

                            @for(tech of project.technologies; track tech){

                            <span>

                                {{tech}}

                            </span>

                            }

                        </div>

                        <div class="project-buttons">

                            <a [href]="project.github" target="_blank" class="btn btn-outline-primary">

                                <i class="bi bi-github"></i>

                                GitHub

                            </a>

                            <a [href]="project.liveDemo" target="_blank" class="btn btn-primary">

                                Live Demo

                            </a>

                        </div>

                    </div>

                </div>

            </div>

            }

        </div>

    </div>

</section>
